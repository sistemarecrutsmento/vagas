<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vagas com Candidatos — Portal Empresa</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="empresa.css">
</head>
<body>
  <button class="menu-toggle" onclick="document.querySelector('aside').classList.add('aberto'); document.querySelector('.app').classList.add('aside-aberto');" aria-label="Abrir menu">☰</button>

  <div class="app">
    <aside>
      <button class="menu-close" onclick="document.querySelector('aside').classList.remove('aberto'); document.querySelector('.app').classList.remove('aside-aberto');" aria-label="Fechar menu">✕</button>
      <div class="aside-logo">
        <h1>Vagas<span class="dourado">.io</span></h1>
        <small>Portal da Empresa</small>
      </div>

      <a class="nav-item" href="index.html">📊 Dashboard</a>
      <a class="nav-item ativo" href="vagas.html">📋 Vagas com Candidatos</a>
      <a class="nav-item" href="agenda.html">📅 Agenda</a>
      <a class="nav-item" href="perfil.html">⚙️ Perfil</a>

      <div class="aside-user">
        <div class="aside-user-avatar" id="avatar">--</div>
        <div class="aside-user-info">
          <div class="nome" id="user-nome">--</div>
          <div class="empresa" id="user-empresa">--</div>
        </div>
        <button class="btn-logout" onclick="sair()" title="Sair">↪</button>
      </div>
    </aside>

    <main>
      <div class="page-header">
        <div>
          <h2>📋 Vagas com Candidatos</h2>
          <div class="sub">Apenas vagas liberadas para sua empresa</div>
        </div>
      </div>

      <div id="grid" class="vagas-grid">
        <div class="card"><div class="empty">Carregando...</div></div>
      </div>
    </main>
  </div>

  <script>
    const API = 'https://recrutamento-api.onrender.com';
    const token = localStorage.getItem('empresa_token');
    if (!token) window.location.href = 'login.html';

    const usuario = JSON.parse(localStorage.getItem('empresa_usuario') || '{}');
    document.getElementById('avatar').textContent = (usuario.nome || '?').split(' ').filter(Boolean).slice(0, 2).map(s => s[0].toUpperCase()).join('');
    document.getElementById('user-nome').textContent = usuario.nome || '--';
    document.getElementById('user-empresa').textContent = usuario.empresa_nome || '--';

    function sair() {
      if (confirm('Sair do portal?')) {
        localStorage.removeItem('empresa_token');
        localStorage.removeItem('empresa_usuario');
        window.location.href = 'login.html';
      }
    }

    async function carregar() {
      const grid = document.getElementById('grid');
      try {
        const r = await fetch(API + '/api/empresa/vagas-com-candidaturas', {
          headers: { 'Authorization': 'Bearer ' + token }
        });
        if (r.status === 401 || r.status === 403) { sair(); return; }
        const data = await r.json();
        const vagas = data.vagas || [];

        if (vagas.length === 0) {
          grid.innerHTML = '<div class="card"><div class="empty">Nenhuma vaga com candidatos ainda.</div></div>';
          return;
        }

        grid.innerHTML = vagas.map(v => {
          const local = [v.cidade, v.estado].filter(Boolean).join(' / ') || '—';
          return `<a class="vaga-card" href="candidatos.html?vaga=${v.id}">
            <h3>${v.titulo || '—'}</h3>
            <div class="local">${v.empresa || '—'} • ${local}</div>
            <div class="stats">
              <div class="stat"><strong>${v.total_geral || 0}</strong><small>Total</small></div>
              <div class="stat"><strong style="color:#F57C00;">${v.em_analise || 0}</strong><small>Em análise</small></div>
              <div class="stat"><strong style="color:#2E7D32;">${v.contratados || 0}</strong><small>Contratados</small></div>
            </div>
          </a>`;
        }).join('');
      } catch (e) {
        grid.innerHTML = '<div class="card"><div class="empty">Erro ao carregar: ' + e.message + '</div></div>';
      }
    }

    carregar();
  </script>
</body>
</html>

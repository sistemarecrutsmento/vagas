<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login Empresa · Vagas.io</title>
  <!-- CSS é inline (<style>) neste arquivo; link externo removido -->
  <style>
    :root {
      --vinho: #722F37;
      --vinho-claro: #8a3a44;
      --dourado: #C9A961;
      --bg: #f7f5f2;
      --card: #ffffff;
      --texto: #1a1a1a;
      --texto-suave: #6b6b6b;
      --borda: #e5e0d8;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #722F37 0%, #4a1f25 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .login-card {
      background: var(--card);
      border-radius: 16px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
      padding: 40px 32px;
      max-width: 420px;
      width: 100%;
    }

    .logo {
      text-align: center;
      margin-bottom: 32px;
    }

    .logo .marca {
      font-size: 32px;
      font-weight: 800;
      color: var(--vinho);
      letter-spacing: -0.5px;
    }

    .logo .marca .dourado { color: var(--dourado); }

    .logo .subtitulo {
      font-size: 13px;
      color: var(--texto-suave);
      margin-top: 4px;
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }

    h1 {
      font-size: 20px;
      color: var(--texto);
      margin-bottom: 8px;
      text-align: center;
    }

    .sub {
      text-align: center;
      color: var(--texto-suave);
      font-size: 14px;
      margin-bottom: 24px;
    }

    label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: var(--texto);
      margin-bottom: 6px;
      margin-top: 14px;
    }

    input {
      width: 100%;
      padding: 12px 14px;
      border: 1px solid var(--borda);
      border-radius: 8px;
      font-size: 15px;
      transition: all 0.2s;
    }

    input:focus {
      outline: none;
      border-color: var(--vinho);
      box-shadow: 0 0 0 3px rgba(114,47,55,0.1);
    }

    .btn-entrar {
      width: 100%;
      background: var(--vinho);
      color: #fff;
      border: 0;
      padding: 14px;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 24px;
      transition: background 0.2s;
    }

    .btn-entrar:hover { background: var(--vinho-claro); }
    .btn-entrar:disabled { opacity: 0.6; cursor: not-allowed; }

    .erro {
      background: #fee;
      color: #c33;
      padding: 10px 12px;
      border-radius: 6px;
      font-size: 13px;
      margin-top: 12px;
      display: none;
    }

    .erro.ativo { display: block; }

    .rodape {
      text-align: center;
      margin-top: 24px;
      font-size: 12px;
      color: var(--texto-suave);
    }

    .rodape a {
      color: var(--vinho);
      text-decoration: none;
      font-weight: 600;
    }
  </style>
</head>
<body>
  <div class="login-card">
    <div class="logo">
      <div class="marca">Vagas<span class="dourado">.io</span></div>
      <div class="subtitulo">Portal da Empresa</div>
    </div>

    <h1>Acessar Portal</h1>
    <p class="sub">Entre com seu e-mail corporativo</p>

    <form id="form-login" onsubmit="return fazerLogin(event)">
      <label for="email">E-mail</label>
      <input type="email" id="email" required placeholder="seu@empresa.com.br" autocomplete="email" />

      <label for="senha">Senha</label>
      <input type="password" id="senha" required placeholder="••••••" autocomplete="current-password" />

      <div class="erro" id="erro"></div>

      <button type="submit" class="btn-entrar" id="btn-entrar">Entrar</button>
    </form>

    <div class="rodape">
      Esqueceu a senha? Fale com seu recrutador.<br>
      <a href="https://vagasio.com.br">← Voltar para o site</a>
    </div>
  </div>

  <script>
    const API = 'https://recrutamento-api.onrender.com';

    // Se já tiver token, manda direto pro dashboard
    if (localStorage.getItem('empresa_token')) {
      window.location.href = 'index.html';
    }

    function mostrarErro(msg) {
      const el = document.getElementById('erro');
      el.textContent = msg;
      el.classList.add('ativo');
      setTimeout(() => el.classList.remove('ativo'), 5000);
    }

    async function fazerLogin(e) {
      e.preventDefault();
      const email = document.getElementById('email').value.trim();
      const senha = document.getElementById('senha').value;
      const btn = document.getElementById('btn-entrar');
      btn.disabled = true;
      btn.textContent = 'Entrando...';

      try {
        const r = await fetch(API + '/api/auth/login-empresa', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, senha })
        });
        const data = await r.json();
        if (!r.ok) {
          mostrarErro(data.erro || 'Erro ao entrar');
          btn.disabled = false;
          btn.textContent = 'Entrar';
          return false;
        }
        localStorage.setItem('empresa_token', data.token);
        localStorage.setItem('empresa_usuario', JSON.stringify(data.usuario));
        window.location.href = 'index.html';
        return false;
      } catch (err) {
        mostrarErro('Erro de conexão. Tente novamente.');
        btn.disabled = false;
        btn.textContent = 'Entrar';
        return false;
      }
    }
  </script>
</body>
</html>

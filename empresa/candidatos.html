<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Candidatos da Vaga — Portal Empresa</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="empresa.css">
  <style>
    table { width: 100%; border-collapse: collapse; }
    th { text-align: left; padding: 14px 18px; background: #fafafa; font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; color: var(--cinza-medio); border-bottom: 1px solid var(--borda); font-weight: 700; }
    td { padding: 16px 18px; border-bottom: 1px solid #f0f0f0; font-size: 14px; }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: #fafafa; }
    .cand-cell { display: flex; align-items: center; gap: 10px; }
    .cand-avatar { width: 36px; height: 36px; border-radius: 50%; background: var(--vinho); color: white; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 14px; }
    .cand-nome { font-weight: 600; color: var(--preto); }
    .cand-email { font-size: 12px; color: var(--cinza-medio); margin-top: 2px; }
    .etapa { display: inline-block; padding: 3px 8px; background: #f0f0f0; border-radius: 4px; font-size: 11px; color: var(--preto); }
    .acoes-cell { display: flex; gap: 6px; }
    .btn-analisar { display: inline-block; padding: 6px 12px; background: var(--vinho); color: white !important; border-radius: 6px; text-decoration: none; font-size: 12px; font-weight: 600; }
    .btn-analisar:hover { background: var(--vinho-escuro); }
    .voltar { color: var(--vinho); text-decoration: none; font-size: 13px; font-weight: 600; }
  </style>
</head>
<body>
  <button class="menu-toggle" onclick="document.querySelector('aside').classList.add('aberto'); document.querySelector('.app').classList.add('aside-aberto');" aria-label="Abrir menu">☰</button>

  <div class="app">
    <aside>
      <button class="menu-close" onclick="document.querySelector('aside').classList.remove('aberto'); document.querySelector('.app').classList.remove('aside-aberto');" aria-label="Fechar menu">✕</button>
      <div class="aside-logo">
        <h1>Vagas<span class="dourado">.io</span></h1>
        <small>Portal da Empresa</small>
      </div>

      <a class="nav-item" href="index.html">📊 Dashboard</a>
      <a class="nav-item ativo" href="vagas.html">📋 Vagas com Candidatos</a>
      <a class="nav-item" href="agenda.html">📅 Agenda</a>
      <a class="nav-item" href="perfil.html">⚙️ Perfil</a>

      <div class="aside-user">
        <div class="aside-user-avatar" id="avatar">--</div>
        <div class="aside-user-info">
          <div class="nome" id="user-nome">--</div>
          <div class="empresa" id="user-empresa">--</div>
        </div>
        <button class="btn-logout" onclick="sair()" title="Sair">↪</button>
      </div>
    </aside>

    <main>
      <div class="page-header">
        <div>
          <a class="voltar" href="vagas.html">← Voltar para Vagas</a>
          <h2 id="titulo-vaga" style="margin-top:8px;">Carregando...</h2>
          <div class="sub" id="info-vaga"></div>
        </div>
      </div>

      <div class="card" style="padding:0; overflow:hidden;">
        <table>
          <thead>
            <tr>
              <th>Candidato</th>
              <th>Etapa</th>
              <th>Status</th>
              <th>Data</th>
              <th>Ações</th>
            </tr>
          </thead>
          <tbody id="cands-tbody">
            <tr><td colspan="5" class="empty">Carregando...</td></tr>
          </tbody>
        </table>
      </div>
    </main>
  </div>

  <script>
    const API = 'https://recrutamento-api.onrender.com';
    const token = localStorage.getItem('empresa_token');
    if (!token) window.location.href = 'login.html';

    const usuario = JSON.parse(localStorage.getItem('empresa_usuario') || '{}');
    document.getElementById('avatar').textContent = (usuario.nome || '?').split(' ').filter(Boolean).slice(0, 2).map(s => s[0].toUpperCase()).join('');
    document.getElementById('user-nome').textContent = usuario.nome || '--';
    document.getElementById('user-empresa').textContent = usuario.empresa_nome || '--';

    function sair() {
      if (confirm('Sair do portal?')) {
        localStorage.removeItem('empresa_token');
        localStorage.removeItem('empresa_usuario');
        window.location.href = 'login.html';
      }
    }

    async function carregar() {
      const params = new URLSearchParams(location.search);
      const vagaId = params.get('vaga');
      if (!vagaId) {
        document.getElementById('titulo-vaga').textContent = 'Vaga não informada';
        return;
      }

      try {
        const r = await fetch(API + '/api/vagas/' + vagaId);
        const data = await r.json();
        if (r.ok && data.vaga) {
          document.getElementById('titulo-vaga').textContent = data.vaga.titulo || 'Vaga';
          document.getElementById('info-vaga').textContent = (data.vaga.cidade ? data.vaga.cidade + ' / ' : '') + (data.vaga.estado || '');
        }
      } catch (e) {}

      try {
        const r = await fetch(API + '/api/empresa/vagas/' + vagaId + '/candidatos', {
          headers: { 'Authorization': 'Bearer ' + token }
        });
        if (r.status === 401 || r.status === 403) { sair(); return; }
        const data = await r.json();
        const cands = data.candidatos || [];

        if (cands.length === 0) {
          document.getElementById('cands-tbody').innerHTML = '<tr><td colspan="5" class="empty">Nenhum candidato ainda.</td></tr>';
          return;
        }

        document.getElementById('cands-tbody').innerHTML = cands.map(c => {
          const iniciais = (c.nome || '?').split(' ').map(s => s[0]).slice(0,2).join('').toUpperCase();
          const etapaNum = Number(c.etapa_atual || 1);
          const etapas = Array.isArray(c.etapas) ? c.etapas : [];
          const etapaNome = etapas[etapaNum - 1]
            ? (typeof etapas[etapaNum - 1] === 'string' ? etapas[etapaNum - 1] : etapas[etapaNum - 1].nome)
            : `Etapa ${etapaNum}`;
          return `<tr>
            <td>
              <div class="cand-cell">
                <div class="cand-avatar">${iniciais}</div>
                <div>
                  <div class="cand-nome">${c.nome || '—'}</div>
                  <div class="cand-email">${c.email || ''}</div>
                </div>
              </div>
            </td>
            <td><span class="etapa">${etapaNum}. ${etapaNome}</span></td>
            <td><span class="status-pill status-${c.status}">${labelStatus(c.status)}</span></td>
            <td>${formatarData(c.criada_em)}</td>
            <td>
              <a class="btn-analisar" href="analisar.html?id=${c.id}">👁 Analisar</a>
            </td>
          </tr>`;
        }).join('');
      } catch (e) {
        document.getElementById('cands-tbody').innerHTML = '<tr><td colspan="5" class="empty">Erro: ' + e.message + '</td></tr>';
      }
    }

    function labelStatus(s) {
      const map = {
        'em_analise': 'Em análise',
        'em_andamento': 'Em andamento',
        'aprovado': 'Aprovado',
        'reprovado': 'Reprovado',
        'rejeitado': 'Reprovado',
        'contratado': 'Contratado'
      };
      return map[s] || s;
    }

    function formatarData(iso) {
      if (!iso) return '—';
      const d = new Date(iso);
      return d.toLocaleDateString('pt-BR');
    }

    carregar();
  </script>
<script src="chat-rh-flutuante.js?v=20260722a"></script>
</body>
</html>

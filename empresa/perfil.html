<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Trocar Senha · Portal Empresa · Vagas.io</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="empresa.css">
  <style>
    .voltar { color: var(--cinza-medio); text-decoration: none; font-size: 13px; margin-bottom: 16px; display: inline-block; }
    .aviso-primeiro { background: #FFF3E0; color: #92400e; padding: 12px 16px; border-radius: 6px; font-size: 13px; margin-bottom: 20px; border-left: 3px solid var(--amarelo); }
    .aviso-primeiro strong { display: block; margin-bottom: 4px; }
    .btn-salvar { background: var(--vinho); color: #fff; border: 0; padding: 12px 18px; border-radius: 6px; font-size: 14px; font-weight: 600; cursor: pointer; margin-top: 8px; width: 100%; }
    .btn-salvar:hover { background: var(--vinho-escuro); }
    .btn-salvar:disabled { opacity: 0.5; cursor: not-allowed; }
    .erro { background: #FFEBEE; color: #C62828; padding: 10px 12px; border-radius: 6px; font-size: 13px; margin-top: 12px; display: none; }
    .erro.ativo { display: block; }
  </style>
</head>
<body>
  <button class="menu-toggle" onclick="document.querySelector('aside').classList.add('aberto'); document.querySelector('.app').classList.add('aside-aberto');" aria-label="Abrir menu">☰</button>

  <div class="app">
    <aside>
      <button class="menu-close" onclick="document.querySelector('aside').classList.remove('aberto'); document.querySelector('.app').classList.remove('aside-aberto');" aria-label="Fechar menu">✕</button>
      <div class="aside-logo">
        <h1>Vagas<span class="dourado">.io</span></h1>
        <small>Portal da Empresa</small>
      </div>

      <a class="nav-item" href="index.html">📊 Dashboard</a>
      <a class="nav-item" href="vagas.html">📋 Vagas com Candidatos</a>
      <a class="nav-item" href="agenda.html">📅 Agenda</a>
      <a class="nav-item ativo" href="perfil.html">⚙️ Perfil</a>

      <div class="aside-user">
        <div class="aside-user-avatar" id="avatar">--</div>
        <div class="aside-user-info">
          <div class="nome" id="user-nome">--</div>
          <div class="empresa" id="user-empresa">--</div>
        </div>
        <button class="btn-logout" onclick="sair()" title="Sair">↪</button>
      </div>
    </aside>

    <main>
      <div class="page-header">
        <div>
          <h2>Trocar senha</h2>
          <div class="sub">Defina uma nova senha de acesso ao portal</div>
        </div>
      </div>

      <a class="voltar" id="voltar-link" href="index.html">← Voltar</a>
      <div class="card" style="max-width: 520px;">
        <div id="aviso-primeiro" class="aviso-primeiro" style="display:none;">
          <strong>🔐 Primeiro acesso</strong>
          Por segurança, troque sua senha temporária antes de continuar usando o portal.
        </div>

        <form onsubmit="return trocarSenha(event)">
          <div class="form-group">
            <label for="senha-atual">Senha atual</label>
            <input type="password" id="senha-atual" required autocomplete="current-password">
          </div>

          <div class="form-group">
            <label for="senha-nova">Nova senha (mínimo 6 caracteres)</label>
            <input type="password" id="senha-nova" required minlength="6" autocomplete="new-password">
          </div>

          <div class="form-group">
            <label for="senha-confirma">Confirme a nova senha</label>
            <input type="password" id="senha-confirma" required minlength="6" autocomplete="new-password">
          </div>

          <div class="erro" id="erro"></div>

          <button type="submit" class="btn-salvar" id="btn-salvar">Salvar nova senha</button>
        </form>
      </div>
    </main>
  </div>

  <div class="toast" id="toast" style="position:fixed; bottom:24px; right:24px; background:#1A1A1A; color:#fff; padding:12px 18px; border-radius:8px; font-size:14px; opacity:0; transition:opacity 0.3s; pointer-events:none; z-index:200;"></div>

  <script>
    const API = 'https://recrutamento-api.onrender.com';
    const token = localStorage.getItem('empresa_token');
    if (!token) window.location.href = 'login.html';

    const usuario = JSON.parse(localStorage.getItem('empresa_usuario') || '{}');
    if (usuario.primeiro_acesso) {
      document.getElementById('aviso-primeiro').style.display = 'block';
      document.getElementById('voltar-link').style.display = 'none';
    }
    document.getElementById('avatar').textContent = (usuario.nome || '?').split(' ').filter(Boolean).slice(0, 2).map(s => s[0].toUpperCase()).join('');
    document.getElementById('user-nome').textContent = usuario.nome || '--';
    document.getElementById('user-empresa').textContent = usuario.empresa_nome || '--';

    function sair() {
      if (confirm('Sair do portal?')) {
        localStorage.removeItem('empresa_token');
        localStorage.removeItem('empresa_usuario');
        window.location.href = 'login.html';
      }
    }

    function mostrarErro(msg) {
      const el = document.getElementById('erro');
      el.textContent = msg;
      el.classList.add('ativo');
      setTimeout(() => el.classList.remove('ativo'), 5000);
    }

    function toast(msg, tipo = '') {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.style.opacity = '1';
      t.style.background = tipo === 'erro' ? '#C62828' : tipo === 'sucesso' ? '#2E7D32' : '#1A1A1A';
      setTimeout(() => t.style.opacity = '0', 3000);
    }

    async function trocarSenha(e) {
      e.preventDefault();
      const atual = document.getElementById('senha-atual').value;
      const nova = document.getElementById('senha-nova').value;
      const confirma = document.getElementById('senha-confirma').value;
      if (nova !== confirma) { mostrarErro('As senhas novas não coincidem'); return false; }
      if (nova.length < 6) { mostrarErro('A senha deve ter no mínimo 6 caracteres'); return false; }

      const btn = document.getElementById('btn-salvar');
      btn.disabled = true;
      btn.textContent = 'Salvando...';

      try {
        const r = await fetch(API + '/api/auth/trocar-senha-empresa', {
          method: 'POST',
          headers: { 'Authorization': 'Bearer ' + token, 'Content-Type': 'application/json' },
          body: JSON.stringify({ senha_atual: atual, senha_nova: nova })
        });
        const data = await r.json();
        if (!r.ok) {
          mostrarErro(data.erro || 'Erro ao trocar senha');
          btn.disabled = false;
          btn.textContent = 'Salvar nova senha';
          return false;
        }
        usuario.primeiro_acesso = false;
        localStorage.setItem('empresa_usuario', JSON.stringify(usuario));
        toast('Senha trocada com sucesso!', 'sucesso');
        setTimeout(() => { window.location.href = 'index.html'; }, 1200);
        return false;
      } catch (err) {
        mostrarErro('Erro de conexão');
        btn.disabled = false;
        btn.textContent = 'Salvar nova senha';
        return false;
      }
    }
  </script>
</body>
</html>

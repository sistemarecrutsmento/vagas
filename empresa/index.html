<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard · Portal Empresa · Vagas.io</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="empresa.css">
</head>
<body>
  <button class="menu-toggle" onclick="document.querySelector('aside').classList.add('aberto'); document.querySelector('.app').classList.add('aside-aberto');" aria-label="Abrir menu">☰</button>

  <div class="app">
    <!-- SIDEBAR -->
    <aside>
      <button class="menu-close" onclick="document.querySelector('aside').classList.remove('aberto'); document.querySelector('.app').classList.remove('aside-aberto');" aria-label="Fechar menu">✕</button>
      <div class="aside-logo">
        <h1>Vagas<span class="dourado">.io</span></h1>
        <small>Portal da Empresa</small>
      </div>

      <a class="nav-item ativo" href="index.html">📊 Dashboard</a>
      <a class="nav-item" href="vagas.html">📋 Vagas com Candidatos</a>
      <a class="nav-item" href="agenda.html">📅 Agenda</a>
      <a class="nav-item" href="perfil.html">⚙️ Perfil</a>

      <div class="aside-user">
        <div class="aside-user-avatar" id="avatar">--</div>
        <div class="aside-user-info">
          <div class="nome" id="user-nome">--</div>
          <div class="empresa" id="user-empresa">--</div>
        </div>
        <button class="btn-logout" onclick="sair()" title="Sair">↪</button>
      </div>
    </aside>

    <!-- MAIN -->
    <main>
      <div class="page-header">
        <div>
          <h2 id="saudacao">Olá! 👋</h2>
          <div class="sub">Acompanhe suas vagas e candidatos em tempo real</div>
        </div>
        <div class="page-actions">
          <a class="btn btn-sec" href="../" title="Voltar para o site">🏡 Site</a>
        </div>
      </div>

      <div class="kpi-grid" id="kpis"></div>

      <div class="page-header" style="margin-top:8px; padding-bottom:8px; border:0;">
        <h2 style="font-size:18px;">Vagas liberadas</h2>
      </div>
      <div id="conteudo">Carregando...</div>
    </main>
  </div>

  <div class="toast" id="toast" style="position:fixed; bottom:24px; right:24px; background:#1A1A1A; color:#fff; padding:12px 18px; border-radius:8px; font-size:14px; opacity:0; transition:opacity 0.3s; pointer-events:none; z-index:200;"></div>

  <script>
    const API = 'https://recrutamento-api.onrender.com';
    const token = localStorage.getItem('empresa_token');
    if (!token) window.location.href = 'login.html';

    function iniciais(nome) {
      if (!nome) return '?';
      return nome.split(' ').filter(Boolean).slice(0, 2).map(s => s[0].toUpperCase()).join('');
    }

    function sair() {
      if (confirm('Sair do portal?')) {
        localStorage.removeItem('empresa_token');
        localStorage.removeItem('empresa_usuario');
        window.location.href = 'login.html';
      }
    }

    function toast(msg, tipo = '') {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.style.opacity = '1';
      t.style.background = tipo === 'erro' ? '#C62828' : tipo === 'sucesso' ? '#2E7D32' : '#1A1A1A';
      setTimeout(() => t.style.opacity = '0', 3000);
    }

    async function carregar() {
      const usuario = JSON.parse(localStorage.getItem('empresa_usuario') || '{}');
      document.getElementById('avatar').textContent = iniciais(usuario.nome);
      document.getElementById('user-nome').textContent = usuario.nome || '--';
      document.getElementById('user-empresa').textContent = usuario.empresa_nome || '--';
      document.getElementById('saudacao').textContent = `Olá, ${(usuario.nome || '').split(' ')[0]}! 👋`;

      try {
        const r = await fetch(API + '/api/empresa/dashboard', { headers: { 'Authorization': 'Bearer ' + token } });
        const data = await r.json();
        if (!r.ok) {
          if (r.status === 401 || r.status === 403) { sair(); return; }
          toast(data.erro || 'Erro ao carregar', 'erro');
          return;
        }

        // KPIs
        const k = data.kpis || {};
        document.getElementById('kpis').innerHTML = `
          <div class="kpi"><div class="label">Vagas liberadas</div><div class="valor">${k.vagas_liberadas || 0}</div></div>
          <div class="kpi"><div class="label">Total de candidatos</div><div class="valor">${k.total_candidatos || 0}</div></div>
          <div class="kpi destaque"><div class="label">Aguardando sua avaliação</div><div class="valor">${k.em_etapa_gestor || 0}</div></div>
          <div class="kpi"><div class="label">Contratações</div><div class="valor" style="color:#2E7D32;">${k.contratacoes || 0}</div></div>
        `;

        // Vagas
        const vagas = data.vagas || [];
        if (vagas.length === 0) {
          document.getElementById('conteudo').innerHTML = `
            <div class="card">
              <div class="empty">
                <div style="font-size:48px; margin-bottom:12px;">🔒</div>
                <h3 style="margin-bottom:8px;">Nenhuma vaga liberada ainda</h3>
                <p>Você ainda não tem vagas autorizadas neste portal. Entre em contato com seu recrutador para liberar o acesso às vagas da sua empresa.</p>
              </div>
            </div>
          `;
          return;
        }

        document.getElementById('conteudo').innerHTML = `
          <div class="vagas-grid">
            ${vagas.map(v => {
              const local = [v.cidade, v.estado].filter(Boolean).join(' / ') || '--';
              return `
              <a class="vaga-card" href="candidatos.html?vaga=${v.id}">
                <h3>${v.titulo}</h3>
                <div class="local">${v.empresa || '—'} • 📍 ${local}</div>
                <div class="stats">
                  <div class="stat"><strong>${v.total_candidatos || 0}</strong><small>Candidatos</small></div>
                  <div class="stat"><strong style="color:#F57C00;">${v.em_andamento || 0}</strong><small>Em andamento</small></div>
                  <div class="stat"><strong style="color:#2E7D32;">${v.contratacoes || 0}</strong><small>Contratados</small></div>
                </div>
              </a>`;
            }).join('')}
          </div>
        `;
      } catch (e) {
        console.error(e);
        toast('Erro de conexão', 'erro');
      }
    }

    carregar();
  </script>
<script src="chat-rh-flutuante.js?v=20260722a"></script>
</body>
</html>

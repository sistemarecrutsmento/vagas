<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>Chat — Vagas.io</title>
  <link rel="stylesheet" href="conversas.css" />
</head>
<body>
  <div class="chat-shell" id="chat-shell">
    <!-- Esquerda: lista -->
    <aside class="conv-list" id="conv-list">
      <div class="conv-list-head">
        <h1>💬 Conversas</h1>
        <p>Fale com o recrutador sobre cada vaga</p>
      </div>
      <div class="conv-list-items" id="conv-items">
        <div class="conv-vazio">
          <div class="icon">⏳</div>
          <p>Carregando conversas...</p>
        </div>
      </div>
    </aside>

    <!-- Direita: conversa ativa -->
    <section class="conv-panel" id="conv-panel">
      <div class="conv-empty" id="conv-empty">
        <div class="icon">💬</div>
        <h3>Selecione uma conversa</h3>
        <p>Escolha uma vaga na lista à esquerda pra começar a falar com o recrutador.</p>
      </div>
    </section>
  </div>

  <script src="conversas.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Redefinir senha — Vagas.io</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <style>
    :root {
      --vinho: #722F37;
      --vinho-escuro: #4A1F25;
      --vinho-claro: #8B3A45;
      --branco: #FFFFFF;
      --preto: #1A1A1A;
      --cinza-texto: #6B6B6B;
      --cinza-bg: #F5F5F5;
      --borda: #E5E5E5;
      --verde: #28A745;
      --vermelho: #C62828;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--cinza-bg);
      min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
      padding: 20px;
      color: var(--preto);
    }
    .container {
      max-width: 420px;
      width: 100%;
      background: var(--branco);
      border-radius: 12px;
      padding: 40px 32px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.06);
    }
    .logo {
      display: flex; align-items: center; justify-content: center; gap: 8px;
      margin-bottom: 28px;
    }
    .logo-icon {
      width: 36px; height: 36px;
      background: linear-gradient(135deg, var(--vinho), var(--vinho-escuro));
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      color: #FFF; font-weight: 900; font-size: 18px;
    }
    .logo span { font-size: 22px; font-weight: 800; }
    .logo strong { color: var(--vinho); }

    h1 { font-size: 22px; font-weight: 800; text-align: center; margin-bottom: 8px; }
    .subtitulo { text-align: center; color: var(--cinza-texto); font-size: 14px; margin-bottom: 28px; line-height: 1.5; }
    label { display: block; font-size: 13px; font-weight: 600; margin-bottom: 6px; }
    input {
      width: 100%; padding: 12px 14px;
      border: 1px solid var(--borda); border-radius: 8px;
      font-size: 15px; font-family: inherit;
      color: var(--preto); background: var(--branco);
      transition: border-color 0.2s;
    }
    input:focus { outline: none; border-color: var(--vinho); }
    .btn {
      width: 100%; padding: 13px;
      background: var(--vinho); color: #FFF;
      border: none; border-radius: 8px;
      font-size: 15px; font-weight: 700;
      cursor: pointer; margin-top: 16px;
      transition: background 0.2s, transform 0.2s;
    }
    .btn:hover:not(:disabled) { background: var(--vinho-claro); transform: translateY(-1px); }
    .btn:disabled { background: #ccc; cursor: not-allowed; }

    .mensagem {
      padding: 12px 14px; border-radius: 8px;
      font-size: 14px; margin-top: 16px;
      display: none; line-height: 1.5;
    }
    .mensagem.sucesso { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; display: block; }
    .mensagem.erro { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; display: block; }
    .mensagem.info { background: #d1ecf1; color: #0c5460; border: 1px solid #bee5eb; display: block; }
    .loading { display: none; }
    .loading.ativo { display: inline-block; }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">
      <div class="logo-icon">V</div>
      <span>Vagas<strong>.io</strong></span>
    </div>
    <h1>Redefinir senha</h1>
    <p class="subtitulo" id="subtitulo">Digite sua nova senha abaixo.</p>

    <div id="msg" class="mensagem"></div>

    <form id="form-redefinir" style="display: none;">
      <label for="senha">Nova senha</label>
      <input type="password" id="senha" name="senha" required minlength="6" placeholder="Mínimo 6 caracteres" autocomplete="new-password" />
      <label for="confirma" style="margin-top: 14px;">Confirme a nova senha</label>
      <input type="password" id="confirma" name="confirma" required minlength="6" placeholder="Digite de novo" autocomplete="new-password" />

      <button type="submit" class="btn" id="btn-redefinir">
        <span class="loading" id="loading">⏳</span>
        <span id="btn-texto">Redefinir senha</span>
      </button>
    </form>
  </div>

  <script>
    const API = 'https://recrutamento-api.onrender.com';
    const params = new URLSearchParams(window.location.search);
    const token = params.get('token');

    const form = document.getElementById('form-redefinir');
    const msg = document.getElementById('msg');
    const subtitulo = document.getElementById('subtitulo');

    if (!token) {
      msg.className = 'mensagem erro';
      msg.textContent = '❌ Link inválido. Solicite um novo link de redefinição.';
      subtitulo.textContent = '';
    } else {
      // Valida o token antes de mostrar o form
      (async () => {
        try {
          const r = await fetch(`${API}/api/auth/validar-token?token=${encodeURIComponent(token)}`);
          const data = await r.json();
          if (data.valido) {
            form.style.display = 'block';
            if (data.nome) subtitulo.textContent = `Olá, ${data.nome}! Digite sua nova senha abaixo.`;
          } else {
            msg.className = 'mensagem erro';
            msg.textContent = '❌ ' + (data.erro || 'Token inválido ou expirado.');
            subtitulo.textContent = '';
          }
        } catch (err) {
          msg.className = 'mensagem erro';
          msg.textContent = '❌ Erro de conexão. Tente de novo em alguns segundos.';
        }
      })();
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      msg.className = 'mensagem';

      const senha = document.getElementById('senha').value;
      const confirma = document.getElementById('confirma').value;
      if (senha !== confirma) {
        msg.className = 'mensagem erro';
        msg.textContent = '❌ As senhas não coincidem.';
        return;
      }
      if (senha.length < 6) {
        msg.className = 'mensagem erro';
        msg.textContent = '❌ A senha deve ter no mínimo 6 caracteres.';
        return;
      }

      const btn = document.getElementById('btn-redefinir');
      const btnTexto = document.getElementById('btn-texto');
      const loading = document.getElementById('loading');
      btn.disabled = true;
      loading.classList.add('ativo');
      btnTexto.textContent = 'Salvando...';

      try {
        const r = await fetch(`${API}/api/auth/redefinir-senha`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ token, novaSenha: senha })
        });
        const data = await r.json();
        if (data.sucesso) {
          msg.className = 'mensagem sucesso';
          msg.textContent = '✅ Senha redefinida com sucesso! Você já pode fazer login com a nova senha.';
          form.style.display = 'none';
          subtitulo.textContent = 'Tudo certo! Redirecionando...';
          setTimeout(() => { window.location.href = 'index.html'; }, 3000);
        } else {
          msg.className = 'mensagem erro';
          msg.textContent = '❌ ' + (data.erro || 'Erro ao redefinir senha.');
          btn.disabled = false;
          loading.classList.remove('ativo');
          btnTexto.textContent = 'Redefinir senha';
        }
      } catch (err) {
        msg.className = 'mensagem erro';
        msg.textContent = '❌ Erro de conexão. Tente de novo em alguns segundos.';
        btn.disabled = false;
        loading.classList.remove('ativo');
        btnTexto.textContent = 'Redefinir senha';
      }
    });
  </script>
</body>
</html>

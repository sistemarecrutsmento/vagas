<!DOCTYPE html>
<html><head><meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', system-ui, sans-serif; }
  body { background: linear-gradient(135deg, #1a1a1a 0%, #2a2a2a 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
  .login-card { background: white; border-radius: 12px; padding: 48px 40px; width: 100%; max-width: 420px; box-shadow: 0 20px 60px rgba(0,0,0,0.3); }
  .logo { text-align: center; margin-bottom: 32px; }
  .logo-text { font-size: 32px; font-weight: 800; color: #722F37; }
  .logo-sub { font-size: 13px; color: #999; margin-top: 4px; }
  h1 { font-size: 24px; font-weight: 700; color: #1a1a1a; text-align: center; margin-bottom: 8px; }
  .subtitle { color: #666; text-align: center; font-size: 14px; margin-bottom: 32px; }
  .form-group { margin-bottom: 18px; }
  label { display: block; font-size: 13px; color: #444; margin-bottom: 6px; font-weight: 500; }
  input { width: 100%; padding: 12px 14px; border: 1px solid #ddd; border-radius: 6px; font-size: 15px; }
  input:focus { outline: none; border-color: #722F37; }
  .btn { width: 100%; padding: 14px; background: #722F37; color: white; border: none; border-radius: 6px; font-size: 16px; font-weight: 600; cursor: pointer; margin-top: 12px; }
  .demo-tip { background: #FFF8E1; border: 1px solid #FFD54F; border-radius: 6px; padding: 10px 14px; font-size: 12px; color: #666; margin-top: 16px; text-align: center; }
</style>
</head>
<body>
  <div class="login-card">
    <div class="logo">
      <div class="logo-text">Vagas.io</div>
      <div class="logo-sub">Painel Administrativo</div>
    </div>
    <h1>Bem-vindo de volta</h1>
    <p class="subtitle">Acesse o painel de gestão de recrutamento</p>
    <div class="form-group">
      <label>E-mail</label>
      <input type="email" value="admin@empresa.com.br">
    </div>
    <div class="form-group">
      <label>Senha</label>
      <input type="password" value="••••••••••">
    </div>
    <button class="btn">Entrar no painel</button>
    <div class="demo-tip">🔒 Login seguro com JWT + criptografia bcrypt</div>
  </div>
</body>
</html>

<body>
<iframe id="f" src="perfil.html?v=10" style="width:100%;height:100vh;border:0"></iframe>
<div id="dbg" style="position:fixed;top:0;right:0;width:300px;background:black;color:lime;font:11px monospace;padding:8px;z-index:9999;max-height:200px;overflow:auto"></div>
<script>
const dbg = document.getElementById('dbg');
function log(...args) {
  const t = args.map(a => typeof a === 'object' ? JSON.stringify(a) : String(a)).join(' ');
  dbg.textContent += t + '\n';
}
const f = document.getElementById('f');
f.addEventListener('load', () => {
  setTimeout(() => {
    try {
      const w = f.contentWindow;
      const d = f.contentDocument;
      log('iframe carregado');
      const form = d.getElementById('perfil-form');
      log('form?', !!form);
      if (form) {
        log('btn?', !!form.querySelector('button[type=submit]'));
        log('pe-nome?', d.getElementById('pe-nome')?.value);
        // interceptar alert
        w.alert = (msg) => log('ALERT iframe:', msg);
        // interceptar submit
        form.addEventListener('submit', (e) => {
          log('SUBMIT iframe', d.getElementById('pe-nome')?.value);
        }, true);
        // também clicar manualmente
        const btn = form.querySelector('button[type=submit]');
        btn.addEventListener('click', () => log('CLICK btn', d.getElementById('pe-nome')?.value), true);
      }
    } catch(e) { log('cross-origin?', e.message); }
  }, 1500);
});
</script>

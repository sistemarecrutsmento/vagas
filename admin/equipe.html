<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Equipe · Admin Vagas.io</title>
  <!-- CSS é inline (<style>) neste arquivo; link externo removido -->
  <style>
    :root { --vinho: #722F37; --dourado: #C9A961; --bg: #f7f5f2; --card: #ffffff; --texto: #1a1a1a; --borda: #e5e0d8; }
    body { font-family: -apple-system, sans-serif; background: var(--bg); color: var(--texto); margin: 0; }
    .app { display: flex; min-height: 100vh; }
    aside { width: 260px; background: var(--vinho); color: #fff; padding: 20px; flex-shrink: 0; }
    .nav-item { display: block; padding: 12px; color: rgba(255,255,255,0.7); text-decoration: none; border-radius: 8px; cursor: pointer; margin-bottom: 4px; }
    .nav-item:hover, .nav-item.ativo { background: rgba(255,255,255,0.1); color: #fff; }
    main { flex: 1; padding: 32px; }
    .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; }
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 16px; }
    .card { background: #fff; padding: 20px; border-radius: 12px; border: 1px solid var(--borda); }
    .btn { padding: 10px 20px; border-radius: 8px; border: 0; cursor: pointer; font-weight: bold; }
    .btn-primary { background: var(--vinho); color: #fff; }
  </style>
  <script src="../candidato/chat-uploader.js"></script>
</head>
<body>
  <div class="app">
    <aside>
      <div style="margin-bottom:30px;"><h2>Admin</h2></div>
      <a class="nav-item" href="index.html">📊 Dashboard</a>
      <a class="nav-item" href="vagas.html">💼 Vagas</a>
      <a class="nav-item" href="candidatos.html">👥 Base de Talentos</a>
      <a class="nav-item" href="candidaturas.html">📋 Candidaturas</a>
      <a class="nav-item" href="agenda.html">📅 Agenda</a>
      <a class="nav-item ativo" href="equipe.html">👥 Equipe</a>
    </aside>
    <main>
      <div class="header">
        <h1>👥 Gestão de Equipe</h1>
        <button class="btn btn-primary" onclick="alert('Funcionalidade em manutenção para ajustes multi-usuário')">+ Novo Membro</button>
      </div>
      <div class="grid" id="lista">
        <div class="card">
          <h3>Carregando membros...</h3>
        </div>
      </div>
    </main>
  </div>
  <script>
    const token = localStorage.getItem('admin_token');
    if (!token) window.location.href = 'index.html';

    async function carregar() {
      try {
        const r = await fetch('https://recrutamento-api.onrender.com/api/admin/equipe', {
          headers: { 'Authorization': 'Bearer ' + token }
        });
        const data = await r.json();
        const lista = document.getElementById('lista');
        if (data.recrutadores && data.recrutadores.length > 0) {
          lista.innerHTML = data.recrutadores.map(u => `
            <div class="card">
              <div style="font-weight:bold; font-size:18px;">${u.nome}</div>
              <div style="color:#666;">${u.email}</div>
              <div style="margin-top:10px;"><span style="background:#dcfce7; color:#16a34a; padding:4px 8px; border-radius:6px; font-size:12px;">Recrutador</span></div>
            </div>
          `).join('');
        } else {
          lista.innerHTML = '<div class="card">Nenhum membro encontrado.</div>';
        }
      } catch (e) {
        document.getElementById('lista').innerHTML = '<div class="card" style="color:red;">Erro ao carregar equipe. Verifique sua conexão.</div>';
      }
    }
    carregar();
  </script>
</body>
</html>

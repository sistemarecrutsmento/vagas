<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Candidatos da Vaga — Admin</title>
  <style>
    :root {
      --vinho: #7B1F1F;
      --vinho-escuro: #5a1414;
      --dourado: #D4AF37;
      --borda: #e0e0e0;
      --cinza: #f5f5f5;
      --cinza-medio: #888;
      --branco: #fff;
      --preto: #222;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif; background: var(--cinza); color: var(--preto); }
    .app { display: flex; min-height: 100vh; }
    aside { width: 260px; background: var(--vinho); color: #fff; padding: 20px 16px; flex-shrink: 0; display: flex; flex-direction: column; }
    .aside-logo { padding: 0 8px 20px; border-bottom: 1px solid rgba(255,255,255,0.1); margin-bottom: 16px; }
    .aside-logo h1 { font-size: 18px; font-weight: 800; margin: 0; }
    .aside-logo small { color: rgba(255,255,255,0.6); font-size: 11px; text-transform: uppercase; letter-spacing: 1px; }
    .nav-item { display: block; padding: 10px 12px; color: rgba(255,255,255,0.75); text-decoration: none; border-radius: 8px; cursor: pointer; margin-bottom: 4px; font-size: 14px; }
    .nav-item:hover, .nav-item.ativo { background: rgba(255,255,255,0.1); color: #fff; }
    .aside-user { margin-top: auto; padding: 16px 8px 8px; border-top: 1px solid rgba(255,255,255,0.1); display: flex; align-items: center; gap: 10px; }
    .aside-user-avatar { width: 36px; height: 36px; border-radius: 50%; background: var(--dourado); color: var(--preto); font-weight: 700; display: flex; align-items: center; justify-content: center; font-size: 14px; flex-shrink: 0; }
    .aside-user-info { flex: 1; min-width: 0; }
    .aside-user-info .nome { font-size: 13px; font-weight: 600; color: #fff; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .aside-user-info .empresa { font-size: 11px; color: rgba(255,255,255,0.6); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .btn-logout { background: rgba(255,255,255,0.1); color: #fff; border: 0; padding: 6px 10px; border-radius: 4px; cursor: pointer; font-size: 14px; text-decoration: none; }
    .btn-logout:hover { background: rgba(255,255,255,0.2); }
    main { flex: 1; padding: 32px; max-width: 100%; overflow-x: auto; }
    .topo { background: var(--vinho); color: var(--branco); padding: 16px 24px; box-shadow: 0 2px 6px rgba(0,0,0,0.15); display: flex; align-items: center; gap: 16px; }
    .topo h1 { font-size: 18px; font-weight: 600; }
    .topo a { color: var(--dourado); text-decoration: none; font-size: 13px; padding: 6px 12px; border: 1px solid var(--dourado); border-radius: 6px; }
    .topo a:hover { background: var(--dourado); color: var(--vinho); }
    .topo .spacer { flex: 1; }
    .container { max-width: 1100px; margin: 24px auto; padding: 0 16px; }
    .page-header { margin-bottom: 20px; }
    .voltar { color: var(--vinho); text-decoration: none; font-size: 13px; }
    .voltar:hover { text-decoration: underline; }
    .page-header h2 { font-size: 22px; color: var(--preto); margin: 6px 0; }
    .page-header .vaga-info { color: var(--cinza-medio); font-size: 14px; }
    .card { background: var(--branco); border-radius: 8px; box-shadow: 0 1px 4px rgba(0,0,0,0.06); overflow: hidden; }
    table { width: 100%; border-collapse: collapse; }
    thead { background: #fafafa; }
    th { text-align: left; padding: 12px 16px; font-size: 12px; text-transform: uppercase; color: var(--cinza-medio); font-weight: 600; border-bottom: 1px solid var(--borda); }
    td { padding: 14px 16px; border-bottom: 1px solid var(--borda); font-size: 14px; vertical-align: middle; }
    tr:last-child td { border-bottom: none; }
    tr:hover { background: #fafafa; }
    .cand-nome { font-weight: 600; color: var(--preto); }
    .cand-email { font-size: 12px; color: var(--cinza-medio); margin-top: 2px; }
    .etapa-tag { display: inline-block; padding: 4px 10px; background: var(--vinho); color: var(--branco); border-radius: 999px; font-size: 11px; font-weight: 600; }
    .etapa-tag.coleta-docs { background: var(--dourado); color: var(--preto); }
    .status { display: inline-block; padding: 4px 10px; border-radius: 999px; font-size: 11px; font-weight: 600; }
    .status-em_andamento { background: #FFF4E5; color: #B45309; }
    .status-aprovado { background: #E5F8E5; color: #166534; }
    .status-reprovado { background: #FEE2E2; color: #991B1B; }
    .status-contratado { background: #DBEAFE; color: #1E40AF; }
    .btn { display: inline-block; padding: 8px 16px; background: var(--vinho); color: var(--branco); text-decoration: none; border-radius: 6px; font-size: 13px; font-weight: 600; }
    .btn:hover { background: var(--vinho-escuro); }
    .btn-dourado { background: var(--dourado); color: var(--preto); }
    .btn-dourado:hover { background: #B8941F; color: var(--branco); }
    .empty { text-align: center; padding: 40px; color: var(--cinza-medio); }
    .acoes-cell { display: flex; gap: 6px; flex-wrap: wrap; }
    .doc-pill { display: inline-block; margin-left: 6px; padding: 2px 8px; background: var(--dourado); color: var(--preto); border-radius: 999px; font-size: 10px; font-weight: 700; vertical-align: middle; }
  </style>
  <script src="../candidato/chat-uploader.js"></script>
</head>
<body>
  <div class="app">
    <aside>
      <div class="aside-logo">
        <h1>Admin</h1>
        <small>Vagas.io</small>
      </div>
      <a class="nav-item" href="index.html">📊 Dashboard</a>
      <a class="nav-item" href="index.html?page=vagas">💼 Vagas</a>
      <a class="nav-item" href="index.html?page=candidatos">👥 Base de Talentos</a>
      <a class="nav-item ativo" href="candidaturas.html">📋 Vagas com Candidatos</a>
      <a class="nav-item" href="agenda.html">📅 Agenda</a>
      <a class="nav-item" href="equipe.html">👥 Equipe</a>
      <a class="nav-item" href="../" style="opacity:0.7;">🏡 Voltar pro site</a>
      <div class="aside-user">
        <div class="aside-user-avatar" id="aside-user-avatar">--</div>
        <div class="aside-user-info">
          <div class="nome" id="aside-user-nome">--</div>
          <div class="empresa" id="aside-user-empresa">--</div>
        </div>
        <a href="index.html" class="btn-logout" title="Sair">↪</a>
      </div>
    </aside>
    <main>
      <a class="voltar" href="candidaturas.html" style="margin-bottom:16px; display:inline-block;">← Voltar para Vagas</a>
      <h2 id="titulo-vaga" style="font-size:24px; margin:8px 0 4px;">Carregando...</h2>
      <div class="vaga-info" id="info-vaga" style="color:#888; margin-bottom:24px;"></div>

      <div class="card">
        <table>
          <thead>
            <tr>
              <th>Candidato</th>
              <th>Local</th>
              <th>Etapa</th>
              <th>Status</th>
              <th>Data</th>
              <th>Ações</th>
            </tr>
          </thead>
          <tbody id="cands-tbody">
            <tr><td colspan="6" class="empty">Carregando...</td></tr>
          </tbody>
        </table>
      </div>
    </main>
  </div>

  <script>
    const API = 'https://recrutamento-api.onrender.com';
    const ETAPAS = ['Inscrição', 'Triagem', 'Entrevista RH', 'Entrevista Gestor', 'Proposta', 'Coleta de Documentos', 'Contratação'];

    function carregarUsuarioSidebar() {
      try {
        const t = localStorage.getItem('admin_token');
        if (!t) return;
        const parts = t.split('.');
        if (parts.length < 2) return;
        const payload = JSON.parse(atob(parts[1].replace(/-/g, '+').replace(/_/g, '/')));
        const nome = payload.nome || 'Admin';
        const iniciais = nome.split(/\s+/).map(s => s[0]).filter(Boolean).slice(0, 2).join('').toUpperCase();
        const elAvatar = document.getElementById('aside-user-avatar');
        const elNome = document.getElementById('aside-user-nome');
        const elEmpresa = document.getElementById('aside-user-empresa');
        if (elAvatar) elAvatar.textContent = iniciais || 'A';
        if (elNome) elNome.textContent = nome;
        if (elEmpresa) elEmpresa.textContent = payload.email || '';
      } catch (e) { /* silencioso */ }
    }

    async function carregar() {
      const token = localStorage.getItem('admin_token');
      if (!token) { location.href = 'index.html'; return; }

      const params = new URLSearchParams(location.search);
      const vagaId = params.get('vaga');
      if (!vagaId) {
        document.getElementById('titulo-vaga').textContent = 'Vaga não informada';
        return;
      }

      // Carrega info da vaga
      try {
        const r = await fetch(API + '/api/vagas/' + vagaId);
        const data = await r.json();
        if (r.ok && data.vaga) {
          document.getElementById('titulo-vaga').textContent = data.vaga.titulo || 'Vaga';
          document.getElementById('info-vaga').textContent = (data.vaga.cidade ? data.vaga.cidade + ' / ' : '') + (data.vaga.estado || '');
        }
      } catch (e) {}

      // Carrega candidatos
      try {
        const r = await fetch(API + '/api/admin/vagas/' + vagaId + '/candidaturas', {
          headers: { 'Authorization': 'Bearer ' + token }
        });
        if (r.status === 401 || r.status === 403) { location.href = 'index.html'; return; }
        const data = await r.json();
        const cands = data.candidaturas || [];
        if (!cands.length) {
          document.getElementById('cands-tbody').innerHTML = '<tr><td colspan="6" class="empty">Nenhum candidato ainda.</td></tr>';
          return;
        }

        document.getElementById('cands-tbody').innerHTML = cands.map(c => {
          const etapa = c.etapa_atual || 0;
          const etapaNome = ETAPAS[etapa - 1] || ('Etapa ' + etapa);
          const isColeta = etapa >= 6;  // Coleta é etapa 6
          return `<tr>
            <td>
              <div class="cand-nome">${c.nome || '—'}</div>
              <div class="cand-email">${c.email || ''}</div>
            </td>
            <td>${[c.cidade, c.estado].filter(Boolean).join(' / ') || '—'}</td>
            <td>
              <span class="etapa-tag ${isColeta ? 'coleta-docs' : ''}">${etapa}. ${etapaNome}</span>
              ${isColeta ? '<span class="doc-pill">📄 validar docs</span>' : ''}
            </td>
            <td>${badgeStatus(c.status)}</td>
            <td>${formatarData(c.criada_em)}</td>
            <td>
              <div class="acoes-cell">
                <a class="btn" href="analisar.html?id=${c.id}&v=FIX_${Date.now()}" target="_blank">👁 Analisar</a>
                ${isColeta ? '<a class="btn btn-dourado" href="validar-documentos.html?id=' + c.id + '" target="_blank">📄 Validar docs</a>' : ''}
              </div>
            </td>
          </tr>`;
        }).join('');
      } catch (e) {
        document.getElementById('cands-tbody').innerHTML = '<tr><td colspan="6" class="empty">Erro: ' + e.message + '</td></tr>';
      }
    }

    function badgeStatus(s) {
      const map = {
        'em_andamento': '<span class="status status-em_andamento">Em andamento</span>',
        'aprovado': '<span class="status status-aprovado">Aprovado</span>',
        'reprovado': '<span class="status status-reprovado">Reprovado</span>',
        'contratado': '<span class="status status-contratado">Contratado</span>'
      };
      return map[s] || s;
    }

    function formatarData(iso) {
      if (!iso) return '—';
      const d = new Date(iso);
      return d.toLocaleDateString('pt-BR');
    }

    carregar();
    carregarUsuarioSidebar();
  </script>
<script src="chat-empresa-flutuante.js?v=20260722a"></script>
</body>
</html>

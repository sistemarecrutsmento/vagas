<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Mobile Wrapper</title>
<style>
  body { margin: 0; padding: 0; background: #333; }
  .mobile-frame {
    width: 375px;
    height: 812px;
    margin: 20px auto;
    border: 8px solid #000;
    border-radius: 30px;
    overflow: hidden;
    background: #fff;
    box-shadow: 0 10px 40px rgba(0,0,0,0.3);
  }
  iframe {
    width: 100%;
    height: 100%;
    border: 0;
  }
</style>
</head>
<body>
<div class="mobile-frame">
  <iframe src="https://sistemarecrutsmento.github.io/vagas/admin/index.html?_=vmob4"></iframe>
</div>
</body>
</html>

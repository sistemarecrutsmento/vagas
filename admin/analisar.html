<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>Analisar Candidato — Admin</title>
  <style>
    :root { --vinho:#6B0F1A; --vinho-claro:#8B1A2B; --cinza:#F5F5F5; --cinza-medio:#999; --cinza-escuro:#2A2A2A; --branco:#fff; }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: var(--cinza); color: var(--cinza-escuro); padding: 24px; }
    .container { max-width: 1100px; margin: 0 auto; }
    .header { background: var(--branco); padding: 24px; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.04); margin-bottom: 16px; position: relative; }
    .header .btn-voltar { position: absolute; left: 24px; top: 50%; transform: translateY(-50%); display: inline-flex; align-items: center; gap: 6px; background: transparent; border: 1px solid var(--cinza-medio); color: var(--cinza-escuro); padding: 8px 14px; border-radius: 8px; cursor: pointer; font-size: 14px; font-weight: 600; transition: all 0.15s; }
    .header .btn-voltar:hover { background: var(--cinza); border-color: var(--vinho); color: var(--vinho); }
    .header .btn-voltar svg { width: 18px; height: 18px; }
    .header h1 { color: var(--vinho); font-size: 24px; margin-bottom: 4px; padding-left: 110px; }
    .header .sub { color: var(--cinza-medio); font-size: 14px; padding-left: 110px; }
    .status-pill { display: inline-block; padding: 4px 12px; border-radius: 999px; font-size: 12px; font-weight: 600; margin-top: 8px; }
    .status-em_andamento { background: #FFF4E5; color: #B45309; }
    .status-aprovado { background: #E5F8E5; color: #166534; }
    .status-reprovado { background: #FEE2E2; color: #991B1B; }
    .status-contratado { background: #DBEAFE; color: #1E40AF; }
    .card { background: var(--branco); border-radius: 12px; padding: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.04); margin-bottom: 16px; }
    .card h2 { font-size: 16px; color: var(--vinho); margin-bottom: 12px; padding-bottom: 8px; border-bottom: 1px solid var(--cinza); }
    .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .field { font-size: 14px; }
    .field-label { color: var(--cinza-medio); font-size: 12px; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 2px; }
    .field-value { color: var(--cinza-escuro); font-size: 15px; font-weight: 500; }
    .timeline { display: flex; gap: 4px; overflow-x: auto; padding: 8px 0; }
    .etapa { flex: 1; min-width: 110px; padding: 10px 12px; border-radius: 8px; background: #F0F0F0; color: #BBB; font-size: 12px; text-align: center; position: relative; }
    .etapa.concluida { background: #DCFCE7; color: #166534; }
    .etapa.atual { background: var(--vinho); color: var(--branco); font-weight: 600; }
    .etapa .num { font-size: 11px; opacity: 0.8; margin-bottom: 2px; }
    .acoes { display: flex; gap: 12px; padding: 20px; background: var(--branco); border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.04); }
    .aviso-etapa { flex: 1; text-align: center; color: var(--cinza-medio); font-size: 14px; padding: 12px; background: #F9F6F0; border-radius: 8px; border-left: 3px solid var(--vinho-claro); }
    .btn { padding: 12px 24px; border-radius: 8px; border: none; font-size: 15px; font-weight: 600; cursor: pointer; flex: 1; }
    .btn-aprovar { background: #16A34A; color: white; }
    .btn-aprovar:hover { background: #15803D; }
    .btn-reprovar { background: #DC2626; color: white; }
    .btn-reprovar:hover { background: #B91C1C; }
    .btn-reabrir { background: var(--cinza-escuro); color: white; }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .aviso-bloq { width: 100%; margin-top: 10px; padding: 10px 12px; background: var(--amarelo-bg); color: var(--amarelo); border-radius: 6px; font-size: 13px; border: 1px solid var(--amarelo); }
    .empty { text-align: center; padding: 40px; color: var(--cinza-medio); }
    .spinner { border: 3px solid #f3f3f3; border-top: 3px solid var(--vinho); border-radius: 50%; width: 32px; height: 32px; animation: spin 1s linear infinite; margin: 0 auto 12px; }
    @keyframes spin { 0% { transform: rotate(0); } 100% { transform: rotate(360deg); } }
    .alert { padding: 12px 16px; border-radius: 8px; margin-bottom: 12px; font-size: 14px; }
    .alert-erro { background: #FEE2E2; color: #991B1B; }
    .alert-sucesso { background: #DCFCE7; color: #166534; }
    .hist-item { padding: 10px; border-left: 3px solid var(--vinho); margin-bottom: 8px; background: #FAFAFA; font-size: 13px; }
    .hist-item small { color: var(--cinza-medio); }
    .badge-etapa { display: inline-block; background: var(--vinho); color: white; padding: 2px 10px; border-radius: 999px; font-size: 12px; font-weight: 600; }
    a { color: var(--vinho); }

    /* ===== Documentos ===== */
    .doc-lista { display: grid; gap: 10px; }
    .doc-row { display: flex; align-items: center; gap: 12px; padding: 12px 14px; border: 1px solid var(--cinza); border-radius: 10px; background: #FAFAFA; }
    .doc-row.status-aprovado { border-color: #16A34A; background: #F0FDF4; }
    .doc-row.status-reprovado { border-color: #DC2626; background: #FEF2F2; }
    .doc-info { flex: 1; min-width: 0; }
    .doc-tipo { font-size: 14px; font-weight: 600; color: var(--cinza-escuro); }
    .doc-valor { font-size: 13px; color: var(--cinza-medio); margin-top: 2px; word-break: break-all; }
    .doc-valor a { color: var(--vinho); text-decoration: underline; }
    .doc-pendente { font-size: 12px; color: var(--cinza-medio); font-style: italic; }
    .doc-justificativa { font-size: 12px; color: #991B1B; margin-top: 4px; font-style: italic; }
    .doc-badge { display: inline-block; padding: 3px 10px; border-radius: 999px; font-size: 11px; font-weight: 700; text-transform: uppercase; }
    .doc-badge-pendente { background: #FEF3C7; color: #92400E; }
    .doc-badge-aprovado { background: #DCFCE7; color: #166534; }
    .doc-badge-reprovado { background: #FEE2E2; color: #991B1B; }
    .doc-badge-vazio { background: var(--cinza); color: var(--cinza-medio); }
    .doc-acoes { display: flex; gap: 6px; flex-shrink: 0; }
    .doc-btn { padding: 6px 12px; border-radius: 6px; border: none; font-size: 12px; font-weight: 600; cursor: pointer; }
    .doc-btn-aprovar { background: #16A34A; color: white; }
    .doc-btn-aprovar:hover { background: #15803D; }
    .doc-btn-reprovar { background: #DC2626; color: white; }
    .doc-btn-reprovar:hover { background: #B91C1C; }
    .doc-btn-reverter { background: var(--cinza-medio); color: white; }
    .doc-btn-reverter:hover { background: var(--cinza-escuro); }
  </style>
</head>
<body>
  <div class="container">
    <div id="content">
      <div class="card"><div class="empty"><div class="spinner"></div>Carregando...</div></div>
    </div>
  </div>

  <script>
    const API = 'https://recrutamento-api.onrender.com';

    function voltar() {
      // Volta pra lista de candidatos da vaga (SPA)
      const params = new URLSearchParams(location.search);
      const candId = params.get('id');
      // Se tiver histórico, volta; senão vai pra SPA
      if (document.referrer && document.referrer.includes(location.host)) {
        history.back();
      } else {
        location.href = 'index.html';
      }
    }

    (async () => {
      const content = document.getElementById('content');
      const token = localStorage.getItem('admin_token');
      if (!token) {
        content.innerHTML = '<div class="card"><div class="alert alert-erro">Você não está logado. <a href="index.html">Faça login</a> primeiro.</div></div>';
        return;
      }

      const params = new URLSearchParams(location.search);
      const id = params.get('id');
      if (!id) {
        content.innerHTML = '<div class="card"><div class="alert alert-erro">ID da candidatura não informado.</div></div>';
        return;
      }

      let candidatura;
      try {
        const r = await fetch(API + '/api/admin/candidatura/' + id, { headers: { 'Authorization': 'Bearer ' + token } });
        if (r.status === 401 || r.status === 403) {
          content.innerHTML = '<div class="card"><div class="alert alert-erro">Sessão expirada. <a href="index.html" target="_top">Faça login</a> novamente.</div></div>';
          return;
        }
        const data = await r.json();
        if (!r.ok) {
          content.innerHTML = '<div class="card"><div class="alert alert-erro">' + (data.erro || 'Erro ao carregar') + '</div></div>';
          return;
        }
        candidatura = data.candidatura;
      } catch (e) {
        content.innerHTML = '<div class="card"><div class="alert alert-erro">Erro: ' + e.message + '</div></div>';
        return;
      }

      // Carrega documentos se estiver na fase de coleta (etapa 4 = index 3 OU etapa_atual >= 5)
      const etapaNum = Number(candidatura.etapa_atual || 0);
      let docsCard = '';
      if (etapaNum >= 4) {
        try {
          await carregarDocumentos(id);
          if (_obrigatoriosDocs.length) {
            docsCard = '<div class="card" id="card-documentos">' +
              '<h2>📄 Documentos de Contratação</h2>' +
              '<p style="font-size:13px;color:var(--cinza-medio);margin-bottom:14px">Aprovar ou reprovar cada documento enviado pelo candidato. Em caso de reprovação, a justificativa é obrigatória.</p>' +
              '<div class="doc-lista-wrapper" id="doc-lista-wrapper">' + renderizarDocumentos() + '</div>' +
            '</div>';
          }
        } catch (e) {
          console.error('Erro ao carregar documentos:', e);
        }
      }
      render(candidatura, docsCard);
    })();

    function render(c, docsCard) {
      const content = document.getElementById('content');
      const etapas = (c.etapas || []).map(e => typeof e === 'string' ? e : e.nome);
      const etapaAtual = c.etapa_atual || 1;
      const totalEtapas = etapas.length || 1;
      const ehTriagem = etapaAtual === 2; // 2ª etapa = Triagem Curricular
      const status = c.status || 'em_andamento';

      // Timeline
      const timeline = etapas.map((nome, i) => {
        const idx = i + 1;
        let cls = '';
        if (idx < etapaAtual) cls = 'concluida';
        else if (idx === etapaAtual) cls = 'atual';
        return '<div class="etapa ' + cls + '"><div class="num">' + idx + '/' + totalEtapas + '</div>' + nome + '</div>';
      }).join('');

      // Helper: formata data
      const fmtData = v => {
        if (!v) return null;
        const s = String(v);
        if (/^\d{4}-\d{2}-\d{2}/.test(s)) {
          const [a, m, d] = s.substring(0, 10).split('-');
          return d + '/' + m + '/' + a;
        }
        return s;
      };
      const fmtDataHora = v => {
        if (!v) return '';
        const d = new Date(v);
        if (isNaN(d.getTime())) return String(v);
        return d.toLocaleDateString('pt-BR') + ' ' + d.toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' });
      };

      // Endereço completo
      const endCompleto = [
        c.logradouro ? c.logradouro : null,
        c.numero ? ', ' + c.numero : null,
        c.complemento ? ' — ' + c.complemento : null,
        c.bairro ? '<br>' + c.bairro : null,
        (c.cd_cidade || c.cidade) ? '<br>' + (c.cd_cidade || c.cidade) : null,
        (c.cd_estado || c.estado) ? ' / ' + (c.cd_estado || c.estado) : null,
        c.cep ? '<br>CEP ' + c.cep : null
      ].filter(Boolean).join('');

      // Experiências (array + campo antigo "experiencia")
      const exps = Array.isArray(c.experiencias) ? c.experiencias : [];
      let expsHtml = '';
      if (exps.length > 0) {
        expsHtml = exps.map(e => {
          const ini = fmtData(e.inicio) || '';
          const fim = e.fim ? (fmtData(e.fim)) : (e.atual ? 'Atual' : '');
          return '<div style="padding:10px;border-left:3px solid var(--vinho);margin-bottom:8px;background:#FAFAFA">' +
            '<strong>' + (e.cargo || '—') + '</strong> em ' + (e.empresa || '—') + '<br>' +
            '<small style="color:var(--cinza-medio)">' + ini + (fim ? ' — ' + fim : '') + '</small>' +
            (e.descricao ? '<p style="font-size:13px;margin-top:4px">' + e.descricao + '</p>' : '') +
            '</div>';
        }).join('');
      } else if (c.experiencia) {
        expsHtml = '<div style="padding:10px;border-left:3px solid var(--vinho);background:#FAFAFA;font-size:14px;white-space:pre-wrap">' + c.experiencia + '</div>';
      } else {
        expsHtml = '<p style="color:var(--cinza-medio);font-size:14px">Nenhuma experiência informada.</p>';
      }

      // Formação: formacao pode ser string simples ('Superior completo', 'Graduação'...) OU código curto ('superior'). Mapear para label amigável.
      const FORMACAO_LABELS = {
        'fundamental': 'Ensino Fundamental',
        'medio': 'Ensino Médio',
        'tecnico': 'Ensino Técnico',
        'superior': 'Ensino Superior',
        'pos': 'Pós-graduação',
        'mestrado': 'Mestrado',
        'doutorado': 'Doutorado'
      };
      const SITUACAO_LABELS = {
        'concluido': 'Concluído',
        'cursando': 'Cursando',
        'trancado': 'Trancado',
        'incompleto': 'Incompleto'
      };
      function labelFormacao(v) {
        if (!v) return null;
        const s = String(v).toLowerCase().trim();
        return FORMACAO_LABELS[s] || (v.charAt(0).toUpperCase() + v.slice(1));
      }
      function labelSituacao(v) {
        if (!v) return null;
        const s = String(v).toLowerCase().trim();
        return SITUACAO_LABELS[s] || (v.charAt(0).toUpperCase() + v.slice(1));
      }
      let formacaoHtml = '<p style="color:var(--cinza-medio);font-size:14px">Não informada.</p>';
      const f = c.formacao && typeof c.formacao === 'object' ? c.formacao : null;
      const esc = (f && f.escolaridade) || (typeof c.formacao === 'string' ? c.formacao : null) || c.escolaridade;
      const escLabel = labelFormacao(esc) || esc;
      const curso = (f && f.curso) || c.curso;
      const inst = (f && f.instituicao) || c.instituicao;
      const sitRaw = (f && f.situacao) || c.situacao;
      const sit = labelSituacao(sitRaw);
      const concl = fmtData((f && f.data_conclusao) || c.data_conclusao);
      if (esc || curso || inst) {
        formacaoHtml =
          '<div class="field-value" style="font-weight:600">' + (escLabel || '—') + '</div>' +
          (curso ? '<div class="field-value" style="margin-top:6px">' + curso + '</div>' : '') +
          (inst ? '<div class="field-value" style="font-weight:400;color:var(--cinza-medio);margin-top:2px">' + inst + '</div>' : '') +
          ((sit || concl) ? '<div class="field-value" style="font-weight:400;font-size:13px;color:var(--cinza-medio);margin-top:4px">' + (sit || '') + (concl ? ' • Conclusão: ' + concl : '') + '</div>' : '');
      }

      // Sobre Você
      const sobre = c.sobre_voce || c.sobre;
      const sobreHtml = sobre
        ? '<p style="font-size:14px;line-height:1.6;white-space:pre-wrap">' + sobre + '</p>'
        : '<p style="color:var(--cinza-medio);font-size:14px">Não informado.</p>';

      // Histórico: só mostrar até a etapa atual (não inventar movimentações futuras)
      const hist = Array.isArray(c.historico) ? c.historico : [];
      const histFiltrado = hist.filter(h => (h.etapa == null) || (h.etapa <= etapaAtual));
      // Se o histórico está vazio mas já passou da etapa 1, mostra pelo menos a entrada de criação
      let histHtml;
      if (histFiltrado.length === 0) {
        histHtml = '<p style="color:var(--cinza-medio);font-size:14px">Nenhuma movimentação registrada ainda.</p>';
      } else {
        histHtml = histFiltrado.map(h => {
          const dataFmt = fmtDataHora(h.data);
          const acaoLabel = h.acao === 'avancar' ? 'Avançou para próxima etapa' :
                            h.acao === 'reprovar' ? 'Reprovado' :
                            h.acao === 'reabrir' ? 'Candidatura reaberta' :
                            h.acao === 'aprovar' ? 'Aprovado' : (h.status || '');
          const statusLabel = h.status === 'em_analise' ? 'em análise' : h.status === 'em_andamento' ? 'em andamento' : (h.status || '');
          return '<div class="hist-item">' +
            '<strong>' + (acaoLabel || 'Movimentação') + '</strong>' +
            (h.etapa != null ? ' <span class="badge-etapa">' + h.etapa + '/' + totalEtapas + '</span>' : '') +
            (statusLabel ? ' <small>[' + statusLabel + ']</small>' : '') +
            (dataFmt ? '<br><small>' + dataFmt + '</small>' : '') +
            (h.por ? '<br><small>por ' + h.por + '</small>' : '') +
            '</div>';
        }).join('');
      }

      // Botões de ação (disponíveis em qualquer etapa em_andamento)
      let acoesHtml = '';
      const _stats = window._docsStatsCache || { total: 0, aprovados: 0, reprovados: 0, pendentes: 0 };
      const _tudoAprovado = _stats.total === 0 || (_stats.aprovados === _stats.total && _stats.reprovados === 0 && _stats.pendentes === 0);
      const _bloqueiaAvancar = etapaAtual === 5 && !_tudoAprovado;
      const _temDocs = etapaNum >= 4;
      if (status === 'em_andamento' || status === 'aprovado' || status === 'em_analise') {
        const _avancarDisabled = _bloqueiaAvancar ? ' disabled title="Aprove todos os documentos antes de avançar"' : '';
        const _avancarHint = _bloqueiaAvancar ? '<div class="aviso-bloq">⏳ ' + (_stats.reprovados > 0 ? 'Há ' + _stats.reprovados + ' documento(s) reprovado(s)' : 'Há ' + _stats.pendentes + ' documento(s) pendente(s)') + ' — corrija antes de avançar.</div>' : '';
        acoesHtml = '<div class="acoes">' +
          (_temDocs ? '<a class="btn" style="background:var(--dourado);color:var(--cinza-escuro);text-decoration:none" href="validar-documentos.html?id=' + c.id + '" target="_blank">📄 Validar documentação</a>' : '') +
          '<button class="btn btn-reprovar" onclick="acao(' + c.id + ',\'reprovar\')">✖ Reprovar</button>' +
          '<button class="btn btn-aprovar"' + _avancarDisabled + ' onclick="acao(' + c.id + ',\'aprovar-triagem\')">✓ Aprovar e Avançar</button>' +
          _avancarHint +
        '</div>';
      } else if (status === 'reprovado' || status === 'rejeitado') {
        acoesHtml = '<div class="acoes">' +
          (_temDocs ? '<a class="btn" style="background:var(--dourado);color:var(--cinza-escuro);text-decoration:none" href="validar-documentos.html?id=' + c.id + '" target="_blank">📄 Validar documentação</a>' : '') +
          '<button class="btn btn-reabrir" onclick="acao(' + c.id + ',\'reabrir\')">↻ Reabrir</button>' +
        '</div>';
      }

      content.innerHTML =
        '<div class="header">' +
          '<button class="btn-voltar" onclick="voltar()" title="Voltar para a lista">' +
            '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"></polyline></svg>' +
            'Voltar' +
          '</button>' +
          '<h1>' + (c.nome || 'Candidato') + '</h1>' +
          '<div class="sub">' + (c.titulo || 'Vaga') + (c.v_cidade ? ' • ' + c.v_cidade : '') + '</div>' +
          '<span class="status-pill status-' + status + '">' + (status === 'em_analise' ? 'Em análise' : status === 'em_andamento' ? 'Em andamento' : status === 'contratado' ? 'Contratado' : status === 'reprovado' ? 'Reprovado' : status === 'rejeitado' ? 'Rejeitado' : status === 'aprovado' ? 'Aprovado' : status) + '</span>' +
        '</div>' +

        '<div class="card">' +
          '<h2>📋 Status do Processo</h2>' +
          '<div style="margin-bottom:8px">Etapa atual: <span class="badge-etapa">' + etapaAtual + '/' + totalEtapas + ' — ' + (etapas[etapaAtual - 1] || '—') + '</span></div>' +
          '<div class="timeline">' + timeline + '</div>' +
        '</div>' +

        '<div class="card">' +
          '<h2>👤 Dados Pessoais</h2>' +
          '<div class="grid-2">' +
            '<div class="field"><div class="field-label">Email</div><div class="field-value">' + (c.email || '—') + '</div></div>' +
            '<div class="field"><div class="field-label">Celular</div><div class="field-value">' + (c.celular || '—') + '</div></div>' +
            '<div class="field"><div class="field-label">CPF</div><div class="field-value">' + (c.cpf || '—') + '</div></div>' +
            '<div class="field"><div class="field-label">Data de Nascimento</div><div class="field-value">' + (fmtData(c.data_nascimento) || '—') + '</div></div>' +
            (c.sexo ? '<div class="field"><div class="field-label">Sexo</div><div class="field-value">' + (c.sexo === 'M' ? 'Masculino' : c.sexo === 'F' ? 'Feminino' : c.sexo === 'O' ? 'Outro' : c.sexo) + '</div></div>' : '') +
            (c.acessibilidade ? '<div class="field"><div class="field-label">Acessibilidade</div><div class="field-value">' + c.acessibilidade + '</div></div>' : '') +
            '<div class="field" style="grid-column:1 / -1"><div class="field-label">Endereço</div><div class="field-value">' + (endCompleto || '—') + '</div></div>' +
          '</div>' +
        '</div>' +

        '<div class="card">' +
          '<h2>💬 Sobre você</h2>' + sobreHtml +
        '</div>' +

        '<div class="card">' +
          '<h2>🎓 Formação</h2>' + formacaoHtml +
        '</div>' +

        '<div class="card">' +
          '<h2>💼 Experiências Profissionais</h2>' + expsHtml +
        '</div>' +

        (docsCard || '') +

        '<div class="card">' +
          '<h2>📜 Histórico do Processo</h2>' + histHtml +
        '</div>' +

        acoesHtml;
    }

    async function acao(id, acao) {
      const labels = { 'reprovar': 'reprovar este candidato?', 'aprovar-triagem': 'aprovar este candidato na triagem curricular?', 'reabrir': 'reabrir esta candidatura?' };
      if (!confirm('Tem certeza que deseja ' + labels[acao])) return;
      try {
        const token = localStorage.getItem('admin_token');
        const r = await fetch(API + '/api/admin/candidatura/' + id + '/status', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
          body: JSON.stringify({ acao: acao === 'aprovar-triagem' ? 'avancar' : acao })
        });
        const data = await r.json();
        if (r.ok) {
          // Recarrega os dados
          location.reload();
        } else {
          alert('Erro: ' + (data.erro || 'Não foi possível atualizar'));
        }
      } catch (e) {
        alert('Erro: ' + e.message);
      }
    }

    // ============ DOCUMENTOS ============
    // Carrega + renderiza a lista de documentos da etapa de coleta (etapa 5)
    let _obrigatoriosDocs = []; // cache do schema vindo da API
    let _docsCache = [];        // cache dos docs do candidato

    async function carregarDocumentos(candidaturaId) {
      try {
        const token = localStorage.getItem('admin_token');
        const r = await fetch(API + '/api/admin/candidatura/' + candidaturaId + '/documentos', {
          headers: { 'Authorization': 'Bearer ' + token }
        });
        if (!r.ok) {
          _obrigatoriosDocs = []; _docsCache = [];
          return '';
        }
        const data = await r.json();
        _obrigatoriosDocs = data.obrigatorios || [];
        _docsCache = data.documentos || [];
      } catch (e) {
        console.error('docs:', e);
        _obrigatoriosDocs = []; _docsCache = [];
        return '';
      }
      // Não envia nada se candidato não tem nenhum doc e nem tá na etapa 5
      // (a função é chamada só quando etapa >= 5 mesmo assim; deixamos a UI decidir)
      return renderizarDocumentos();
    }

    function renderizarDocumentos() {
      if (!_obrigatoriosDocs.length) return '';
      // Indexa docs existentes por tipo
      const porTipo = {};
      for (const d of _docsCache) porTipo[d.tipo] = d;

      const fmt = (n) => n ? (n / 1024).toFixed(1) + ' KB' : '';
      const fmtData = (s) => s ? new Date(s).toLocaleString('pt-BR') : '';

      let html = '<div class="doc-lista">';
      for (const o of _obrigatoriosDocs) {
        const d = porTipo[o.tipo];
        const status = d ? d.status : null;
        const isArquivo = o.categoria === 'arquivo';
        let valorHtml = '';
        if (isArquivo) {
          if (d && d.arquivo_url) {
            // Link pra URL do Cloudinary (target _blank)
            valorHtml = '<div class="doc-valor"><a href="' + d.arquivo_url + '" target="_blank" rel="noopener">📎 ' + (d.arquivo_nome || 'ver arquivo') + '</a> <span style="color:var(--cinza-medio)">(' + fmt(d.arquivo_tamanho) + ')</span></div>';
          } else {
            valorHtml = '<div class="doc-pendente">⏳ Candidato ainda não enviou</div>';
          }
        } else {
          // Campo de texto
          if (d && d.valor_texto) {
            valorHtml = '<div class="doc-valor">' + escapeHtml(d.valor_texto) + '</div>';
          } else {
            valorHtml = '<div class="doc-pendente">⏳ Candidato ainda não preencheu</div>';
          }
        }
        // Justificativa (se reprovado)
        if (d && d.status === 'reprovado' && d.justificativa_admin) {
          valorHtml += '<div class="doc-justificativa">Motivo: ' + escapeHtml(d.justificativa_admin) + '</div>';
        }
        // Status badge
        let badge = '';
        if (!d) badge = '<span class="doc-badge doc-badge-vazio">vazio</span>';
        else if (d.status === 'aprovado') badge = '<span class="doc-badge doc-badge-aprovado">✓ aprovado</span>';
        else if (d.status === 'reprovado') badge = '<span class="doc-badge doc-badge-reprovado">✗ reprovado</span>';
        else badge = '<span class="doc-badge doc-badge-pendente">⏳ pendente</span>';

        // Botões de ação (só mostra se candidato JÁ enviou)
        let acoesHtml = '';
        if (d) {
          acoesHtml = '<div class="doc-acoes">';
          if (d.status !== 'aprovado') {
            acoesHtml += '<button class="doc-btn doc-btn-aprovar" onclick="revisarDocumento(' + d.id + ',\'aprovar\')">✓ Aprovar</button>';
          }
          if (d.status !== 'reprovado') {
            acoesHtml += '<button class="doc-btn doc-btn-reprovar" onclick="revisarDocumento(' + d.id + ',\'reprovar\')">✗ Reprovar</button>';
          }
          if (d.status !== 'pendente') {
            acoesHtml += '<button class="doc-btn doc-btn-reverter" onclick="revisarDocumento(' + d.id + ',\'reverter\')">↻ Reverter</button>';
          }
          acoesHtml += '</div>';
        }

        html += '<div class="doc-row ' + (d ? 'status-' + d.status : '') + '">';
        html += '  <div class="doc-info">';
        html += '    <div class="doc-tipo">' + escapeHtml(o.label) + ' ' + badge + '</div>';
        html += '    ' + valorHtml;
        if (d && d.enviado_em) html += '<div class="doc-valor" style="font-size:11px">Enviado em ' + fmtData(d.enviado_em) + (d.revisado_em ? ' • Revisado em ' + fmtData(d.revisado_em) : '') + '</div>';
        html += '  </div>';
        html += '  ' + acoesHtml;
        html += '</div>';
      }
      html += '</div>';

      // Resumo
      const total = _obrigatoriosDocs.length;
      const enviados = _docsCache.length;
      const aprovados = _docsCache.filter(d => d.status === 'aprovado').length;
      const reprovados = _docsCache.filter(d => d.status === 'reprovado').length;
      const pendentes = Math.max(0, total - aprovados - reprovados);
      window._docsStatsCache = { total, enviados, aprovados, reprovados, pendentes };
      const resumo = '<div style="margin-top:14px;padding:10px 14px;background:#F9F6F0;border-radius:8px;font-size:13px;color:var(--cinza-escuro)">' +
        '<strong>Resumo:</strong> ' + enviados + '/' + total + ' enviados • ' +
        '<span style="color:#16A34A">' + aprovados + ' aprovados</span> • ' +
        '<span style="color:#DC2626">' + reprovados + ' reprovados</span> • ' +
        pendentes + ' pendentes' +
        '</div>';

      return html + resumo;
    }

    async function revisarDocumento(docId, acao) {
      // Monta prompt de justificativa
      let justificativa = '';
      if (acao === 'reprovar') {
        justificativa = prompt('Por que você está REPROVANDO este documento?\n\nA justificativa é obrigatória e será enviada ao candidato.', '');
        if (justificativa === null) return; // cancelou
        if (!justificativa.trim()) {
          alert('Justificativa obrigatória para reprovar.');
          return;
        }
      } else if (acao === 'reverter') {
        if (!confirm('Reverter este documento para status pendente?')) return;
      } else if (acao === 'aprovar') {
        if (!confirm('Confirmar aprovação deste documento?')) return;
      }
      try {
        const token = localStorage.getItem('admin_token');
        const r = await fetch(API + '/api/admin/documento/' + docId + '/revisar', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
          body: JSON.stringify({ acao, justificativa })
        });
        const data = await r.json();
        if (!r.ok) { alert('Erro: ' + (data.erro || 'Falha ao revisar')); return; }
        // Atualiza cache local e re-renderiza
        const idx = _docsCache.findIndex(d => d.id === docId);
        if (idx >= 0) {
          _docsCache[idx] = { ..._docsCache[idx], status: data.documento.status, justificativa_admin: data.documento.justificativa_admin, revisado_em: data.documento.revisado_em };
        }
        // Re-renderiza a seção
        const card = document.getElementById('card-documentos');
        if (card) {
          const novaHtml = renderizarDocumentos();
          card.querySelector('.doc-lista-wrapper').innerHTML = novaHtml;
        }
      } catch (e) {
        alert('Erro: ' + e.message);
      }
    }

    function escapeHtml(s) {
      return String(s || '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
    }
  </script>
</body>
</html>
